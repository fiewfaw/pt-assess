<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0ea5e9" />
<title>PT Assess — Patients</title>
<link rel="manifest" href="manifest.json" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<link rel="stylesheet" href="css/style.css" />
<script src="js/storage.js"></script>
<script src="js/templates.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 pb-20">

<div x-data="patientList()" x-init="init()" class="max-w-2xl mx-auto px-4 py-4">

  <!-- Header -->
  <header class="flex items-center justify-between mb-4">
    <div>
      <h1 class="text-xl font-bold text-sky-700">PT Assess</h1>
      <p class="text-xs text-slate-500">
        <span x-text="patients.length"></span> คนไข้ ·
        <span x-text="storageMode" class="capitalize"></span>
      </p>
    </div>
    <div class="flex gap-2">
      <a href="settings.html" class="px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm hover:bg-slate-100">⚙️</a>
    </div>
  </header>

  <!-- Search -->
  <div class="mb-3">
    <input type="search" x-model="search" placeholder="ค้นหา HN / ชื่อ / dx..." class="input" />
  </div>

  <!-- Patient list -->
  <div class="space-y-2">
    <template x-for="p in filteredPatients" :key="p.hn">
      <a :href="`patient.html?hn=${p.hn}`" class="block bg-white rounded-xl border border-slate-200 p-3 hover:border-sky-300 transition">
        <div class="flex justify-between items-start gap-3">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2">
              <span class="font-semibold" x-text="`${p.firstName || '-'} ${p.lastInitial || ''}.`"></span>
              <span class="text-xs text-slate-500" x-text="`HN ${p.hn}`"></span>
            </div>
            <p class="text-sm text-slate-600 mt-0.5 truncate" x-text="p.dx || 'ไม่มี dx'"></p>
            <p class="text-xs text-slate-400 mt-1">
              <span x-text="`${Templates[p.template]?.icon || ''} ${Templates[p.template]?.name || ''}`"></span>
              <span x-show="p.lastVisitDate"> · last visit <span x-text="p.lastVisitDate"></span></span>
              <span x-show="p.visitCount"> · <span x-text="p.visitCount"></span> visits</span>
            </p>
          </div>
          <span class="text-slate-300">›</span>
        </div>
      </a>
    </template>

    <div x-show="patients.length === 0" class="text-center py-12 text-slate-400">
      <p class="text-4xl mb-2">📋</p>
      <p>ยังไม่มีคนไข้</p>
      <p class="text-xs mt-1">กดปุ่ม + ด้านล่างเพื่อเพิ่ม</p>
    </div>
    <div x-show="patients.length > 0 && filteredPatients.length === 0" class="text-center py-8 text-slate-400">
      ไม่พบคนไข้ที่ตรงกับ "<span x-text="search"></span>"
    </div>
  </div>

  <!-- New Patient Modal -->
  <div x-show="newOpen" x-cloak class="fixed inset-0 bg-slate-900/50 z-40 flex items-end sm:items-center justify-center p-4"
       @click.self="newOpen = false">
    <div class="bg-white rounded-2xl w-full max-w-md p-5 space-y-3 max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center">
        <h2 class="text-lg font-bold">เพิ่มคนไข้ใหม่</h2>
        <button @click="newOpen = false" class="text-slate-400 hover:text-slate-700 text-xl">✕</button>
      </div>

      <label class="block">
        <span class="text-xs text-slate-500">HN <span class="text-red-500">*</span></span>
        <input type="text" inputmode="numeric" x-model="newPatient.hn" class="input" placeholder="12345" />
      </label>

      <div class="grid grid-cols-2 gap-3">
        <label><span class="text-xs text-slate-500">ชื่อ <span class="text-red-500">*</span></span>
          <input type="text" x-model="newPatient.firstName" class="input" placeholder="ก." /></label>
        <label><span class="text-xs text-slate-500">นามสกุล (อักษรย่อ)</span>
          <input type="text" x-model="newPatient.lastInitial" class="input" placeholder="ข" /></label>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <label><span class="text-xs text-slate-500">ชื่อเล่น</span>
          <input type="text" x-model="newPatient.nickname" class="input" placeholder="ลุงชัย" /></label>
        <label><span class="text-xs text-slate-500">เบอร์โทร</span>
          <input type="tel" inputmode="tel" x-model="newPatient.phone" class="input" placeholder="08x-xxx-xxxx" /></label>
      </div>

      <div class="grid grid-cols-[1fr_auto] gap-3 items-end">
        <label class="block">
          <span class="text-xs text-slate-500">
            วันเกิด
            <span x-show="newPatient.dob" class="text-sky-600 font-semibold">· <span x-text="ageFromDob(newPatient.dob)"></span> ปี</span>
          </span>
          <input type="date" x-model="newPatient.dob" class="input" />
        </label>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <label><span class="text-xs text-slate-500">เพศ</span>
          <select x-model="newPatient.sex" class="input">
            <option value="">-</option><option>ชาย</option><option>หญิง</option>
          </select></label>
        <label><span class="text-xs text-slate-500">ถนัด</span>
          <select x-model="newPatient.dominantSide" class="input">
            <option value="">-</option><option>R</option><option>L</option>
          </select></label>
      </div>

      <label class="block">
        <span class="text-xs text-slate-500">Diagnosis</span>
        <input type="text" x-model="newPatient.dx" class="input" placeholder="L MCA infarct, R hemiparesis" />
      </label>

      <label class="block">
        <span class="text-xs text-slate-500">ที่อยู่ (เคสโฮม)</span>
        <textarea x-model="newPatient.address" class="input min-h-[50px]" placeholder="บ้านเลขที่ ... ต. ... อ. ..."></textarea>
      </label>
      <label class="block">
        <span class="text-xs text-slate-500">ลิงก์ Google Maps (วางลิงก์หมุดบ้าน)</span>
        <input type="url" x-model="newPatient.mapUrl" class="input" placeholder="https://maps.app.goo.gl/..." />
      </label>

      <div class="grid grid-cols-2 gap-3">
        <label><span class="text-xs text-slate-500">ข้างที่อ่อนแรง</span>
          <select x-model="newPatient.affectedSide" class="input">
            <option value="">-</option><option>R</option><option>L</option><option>bilateral</option>
          </select></label>
        <label><span class="text-xs text-slate-500">วัน onset</span>
          <input type="date" x-model="newPatient.onsetDate" class="input" /></label>
      </div>

      <div>
        <span class="text-xs text-slate-500">Template</span>
        <div class="grid grid-cols-2 gap-2 mt-1">
          <template x-for="t in Object.values(Templates).filter(x => !x.stub && !x.custom)">
            <button type="button" @click="newPatient.template = t.id"
              :class="newPatient.template === t.id ? 'chip-on' : 'chip'"
              class="text-left">
              <span x-text="`${t.icon} ${t.name}`"></span>
            </button>
          </template>
          <template x-for="t in Object.values(Templates).filter(x => x.stub || x.custom)">
            <button type="button" @click="newPatient.template = t.id"
              :class="newPatient.template === t.id ? 'chip-on' : 'chip'"
              class="text-left opacity-60">
              <span x-text="`${t.icon} ${t.name}${t.stub ? ' (soon)' : ''}`"></span>
            </button>
          </template>
        </div>
      </div>

      <div class="pt-2 flex gap-2">
        <button @click="newOpen = false" class="flex-1 py-2 bg-slate-200 rounded-lg hover:bg-slate-300">ยกเลิก</button>
        <button @click="createPatient()" class="flex-1 py-2 bg-sky-600 text-white font-semibold rounded-lg hover:bg-sky-700">สร้าง</button>
      </div>
    </div>
  </div>

  <!-- FAB: New Patient -->
  <button @click="openNew()" class="fixed bottom-6 right-6 z-30 w-14 h-14 bg-sky-600 hover:bg-sky-700 text-white rounded-full shadow-lg text-2xl">+</button>

</div>

<script>
function patientList() {
  const blankPatient = () => ({
    hn: '', firstName: '', lastInitial: '', nickname: '', dob: '', sex: '',
    dominantSide: '', dx: '', affectedSide: '', onsetDate: '',
    phone: '', address: '', mapUrl: '',
    template: 'stroke',
  });

  const ageFromDob = (dob) => {
    if (!dob) return '';
    const birth = new Date(dob);
    if (isNaN(birth)) return '';
    const today = new Date();
    let age = today.getFullYear() - birth.getFullYear();
    const m = today.getMonth() - birth.getMonth();
    if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
    return age;
  };

  return {
    patients: [],
    search: '',
    newOpen: false,
    storageMode: 'local',
    Templates: window.Templates,
    newPatient: blankPatient(),
    blankPatient,
    ageFromDob,

    async init() {
      const storage = window.Storage.get();
      this.storageMode = storage.name;
      const patients = await storage.listPatients();
      // Enrich with visit info
      for (const p of patients) {
        const visits = await storage.listVisits(p.hn);
        p.visitCount = visits.length;
        p.lastVisitDate = visits[0]?.visitDate || null;
      }
      this.patients = patients.sort((a, b) => {
        if (a.lastVisitDate && b.lastVisitDate) return b.lastVisitDate.localeCompare(a.lastVisitDate);
        return (b.updatedAt || '').localeCompare(a.updatedAt || '');
      });
    },

    openNew() {
      this.newPatient = this.blankPatient();
      this.newOpen = true;
    },

    get filteredPatients() {
      if (!this.search) return this.patients;
      const q = this.search.toLowerCase();
      return this.patients.filter(p =>
        (p.hn || '').toLowerCase().includes(q) ||
        (p.firstName || '').toLowerCase().includes(q) ||
        (p.lastInitial || '').toLowerCase().includes(q) ||
        (p.dx || '').toLowerCase().includes(q)
      );
    },

    async createPatient() {
      if (!this.newPatient.hn || !this.newPatient.firstName) {
        alert('กรอก HN และชื่อ');
        return;
      }
      const storage = window.Storage.get();
      const existing = await storage.getPatient(this.newPatient.hn);
      if (existing) {
        if (!confirm(`HN ${this.newPatient.hn} มีอยู่แล้ว (${existing.firstName}) — เขียนทับ?`)) return;
      }
      await storage.savePatient(this.newPatient);
      this.newOpen = false;
      // Navigate to patient page
      window.location.href = `patient.html?hn=${this.newPatient.hn}`;
    },
  };
}
</script>

</body>
</html>
